# 规范驱动项目配置

schema: spec-driven

# 注入到 AI 上下文的固定约定（与 spec/project.md 互补）
context: |
  本项目采用规范驱动开发。
  技术栈默认参考 spec/project.md（Next.js + PostgreSQL + Drizzle）。
  网站类项目调用 @网站开发 Agent 实施。
  需求迭代走 spec/changes/，已上线能力真理源在 spec/specs/。
  AI 草稿与中间产物写入 spec/AI2AI/，人类原始输入写入 spec/ME2AI/，确认后迁入 spec/changes/ 或 docs/。

# 各 artifact 生成规则（可选，按需扩展）
rules:
  proposal:
    - 必须包含 Goal、Scope、Out of scope、Impact
    - 中文撰写，代码标识符用英文
  design:
    - 必须包含信息架构、数据模型、API 清单、页面清单、MVP 边界、验收场景
  tasks:
    - 每条任务可独立验证，带 checkbox
  spec:
    - Delta 变更使用 ## ADDED / ## MODIFIED / ## REMOVED Requirements 节
